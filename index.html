<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦜 Chastico, the Stochastic Parrot 🦜</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; background: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: Georgia, serif; padding: 24px;
  }
  #title { text-align: center; margin-bottom: 20px; }
  #title .name { font-size: 30px; color: #111; font-style: italic; margin-bottom: 4px; }
  #title .sub { font-size: 11px; letter-spacing: 5px; color: #aaa; text-transform: uppercase; }
  #panel { width: 100%; max-width: 560px; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
  #chat {
    height: 400px; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 8px; background: #fff;
  }
  #chat .empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 13px; letter-spacing: 2px; font-style: italic; }
  .msg-row { display: flex; align-items: flex-end; gap: 8px; animation: fadeIn 0.2s ease; }
  .msg-row.user { flex-direction: row-reverse; }
  .avatar { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; background: #fafafa; }
  .bubble { max-width: 75%; padding: 7px 11px; border-radius: 3px; font-size: 14px; line-height: 1.5; display: flex; align-items: baseline; gap: 6px; }
  .msg-timestamp { font-size: 9px; color: #ddd; margin-top: 2px; padding: 0 8px; }
  .bubble.parrot { background: #f9f9f9; border: 1px solid #eee; color: #333; font-style: italic; }
  .bubble.user   { background: #111; color: #fff; }
  .bubble.outburst { background: #111; border: none; color: #fff; font-size: 15px; font-weight: bold; letter-spacing: 1px; font-style: normal; }
  .inst-emoji { font-size: 10px; opacity: 0.4; flex-shrink: 0; }
  #temp-row { padding: 8px 16px; background: #fafafa; border-top: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
  #temp-row span.label { font-size: 10px; color: #bbb; letter-spacing: 2px; }
  #temp-row input { flex: 1; accent-color: #111; cursor: pointer; }
  #temp-row span.val { font-size: 11px; color: #333; min-width: 30px; text-align: right; }
  #temp-row span.mode { font-size: 10px; color: #aaa; min-width: 52px; }
  #input-row { display: flex; padding: 10px 14px; gap: 8px; align-items: center; border-top: 1px solid #eee; background: #fff; }
  #input-row input { flex: 1; background: #fff; border: 1px solid #ddd; border-radius: 3px; padding: 8px 12px; color: #111; font-size: 13px; outline: none; font-family: inherit; transition: border-color 0.3s; }
  #input-row input.outburst { border-color: #c22; }
  #parrot-indicator { line-height: 1; user-select: none; flex-shrink: 0; transition: font-size 0.4s, opacity 0.4s; }
  #send-btn { border: none; border-radius: 3px; padding: 8px 16px; font-size: 12px; cursor: pointer; letter-spacing: 1px; font-family: inherit; transition: all 0.3s; }
  #care-row { display: flex; gap: 6px; padding: 8px 14px 10px; border-top: 1px solid #f5f5f5; background: #fff; }
  .care-btn { background: none; border: 1px solid #ddd; border-radius: 3px; padding: 4px 10px; font-size: 11px; color: #888; cursor: pointer; font-family: inherit; letter-spacing: 0.5px; transition: all 0.3s; }
  .care-btn:disabled { border-color: #f0f0f0; color: #ddd; cursor: default; text-decoration: line-through; }
  #bottom { margin-top: 10px; display: flex; align-items: center; gap: 12px; }
  #memory { font-size: 10px; color: #ccc; letter-spacing: 2px; }
  .sm-btn { background: none; border: 1px solid #ddd; border-radius: 3px; padding: 3px 8px; font-size: 10px; color: #aaa; cursor: pointer; letter-spacing: 1px; font-family: inherit; }
  #legend { margin-top: 12px; width: 100%; max-width: 560px; display: flex; flex-wrap: wrap; gap: 6px 16px; justify-content: center; }
  .leg-item { font-size: 10px; color: #aaa; letter-spacing: 1px; display: flex; align-items: center; gap: 4px; transition: color 0.2s; cursor: help; }
  .leg-item:hover { color: #666; }
  .leg-item.active { color: #111; font-weight: bold; }
  .leg-item .e { font-size: 11px; }
  @keyframes fadeIn  { from { opacity:0; transform:translateY(2px); } to { opacity:1; transform:translateY(0); } }
  @keyframes flicker { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-track { background: #fff; }
  #chat::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
</style>
</head>
<body>

<div id="title">
  <div class="name">Chastico</div>
  <div class="sub">the Stochastic Parrot</div>
</div>

<div id="panel">
  <div id="chat"><div class="empty">listening...</div></div>
  <div id="temp-row">
    <span class="label">FOCUS</span>
    <input type="range" id="temp-slider" min="0.1" max="2.0" step="0.05" value="0.9">
    <span class="val" id="temp-val">0.80</span>
    <span class="mode" id="temp-mode">words</span>
  </div>
  <div id="input-row">
    <input type="text" id="msg-input" placeholder="talk to Chastico...">
    <div id="parrot-indicator" title="Responsiveness">🦜</div>
    <button id="send-btn">SEND</button>
  </div>
  <div id="care-row">
    <button class="care-btn" id="care-treat">🍪 cookie</button>
    <button class="care-btn" id="care-toy">🪀 toy</button>
    <button class="care-btn" id="care-pet">✋ pet</button>
  </div>
</div>

<div id="bottom">
  <div id="memory">0 phrases · 0 words · 0 tokens</div>
  <button class="sm-btn" id="clear-btn">CLEAR</button>
  <button class="sm-btn" id="save-btn">SAVE</button>
  <button class="sm-btn" id="load-btn">LOAD</button>
  <input type="file" id="load-input" accept=".json" style="display:none">
</div>

<div id="legend"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const INSTINCTS = [
  { id:"hunger",      emoji:"🌰", label:"Hunger",      cooldownMin:180000,  cooldownMax:360000,  durationMin:10000, durationMax:30000, tempMin:1.50, tempMax:1.90, messageIntervalMin:1000, messageIntervalMax:3000 },
  { id:"attention",   emoji:"👁️", label:"Attention",   cooldownMin:240000,  cooldownMax:420000,  durationMin:12000, durationMax:35000, tempMin:0.90, tempMax:1.30, messageIntervalMin:2000, messageIntervalMax:4000 },
  { id:"playful",     emoji:"🎲", label:"Playfulness", cooldownMin:200000,  cooldownMax:380000,  durationMin:10000, durationMax:28000, tempMin:1.30, tempMax:1.70, messageIntervalMin:1000, messageIntervalMax:3000 },
  { id:"affection",   emoji:"🪶", label:"Affection",   cooldownMin:300000,  cooldownMax:600000,  durationMin:15000, durationMax:40000, tempMin:0.30, tempMax:0.70, messageIntervalMin:null, messageIntervalMax:null },
  { id:"arousal",     emoji:"❤️", label:"Arousal",     cooldownMin:420000,  cooldownMax:840000,  durationMin:20000, durationMax:50000, tempMin:0.50, tempMax:0.90, messageIntervalMin:2000, messageIntervalMax:5000 },
  { id:"reward",      emoji:"✨", label:"Reward",      cooldownMin:240000,  cooldownMax:480000,  durationMin:12000, durationMax:32000, tempMin:0.70, tempMax:1.10, messageIntervalMin:2000, messageIntervalMax:4000 },
  { id:"territorial", emoji:"🏠", label:"Territory",   cooldownMin:360000,  cooldownMax:720000,  durationMin:15000, durationMax:38000, tempMin:1.70, tempMax:2.00, messageIntervalMin:1000, messageIntervalMax:3000 },
  { id:"curiosity",   emoji:"🔍", label:"Curiosity",   cooldownMin:180000,  cooldownMax:360000,  durationMin:10000, durationMax:25000, tempMin:1.10, tempMax:1.50, messageIntervalMin:1000, messageIntervalMax:2000 },
  { id:"boredom",     emoji:"💤", label:"Boredom",     cooldownMin:300000,  cooldownMax:600000,  durationMin:12000, durationMax:35000, tempMin:0.10, tempMax:0.50, messageIntervalMin:4000, messageIntervalMax:8000 },
];
const COMM = { emoji:"💬", label:"Response", replyWindowMin:300, replyWindowMax:1400, cooldownMin:20000, cooldownMax:50000 };
const CARE_ACTIONS = [
  { id:"treat", label:"cookie", emoji:"🍪" },
  { id:"toy",   label:"toy",    emoji:"🪀" },
  { id:"pet",   label:"pet",    emoji:"✋" },
];
const EMOJI_MAP = Object.fromEntries([
  ...INSTINCTS.map(({id,emoji}) => [id,emoji]),
  ["comm", COMM.emoji], ["outburst","💥"],
]);
const RAPID_WINDOW_MS = 8000;

// ── Helpers ────────────────────────────────────────────────────────────────
const randInt = (a,b) => a + Math.floor(Math.random()*(b-a+1));
const pick    = arr => arr[Math.floor(Math.random()*arr.length)];
const altCaps = s => s.split("").map((c,i)=>i%2===0?c.toUpperCase():c.toLowerCase()).join("");
const crazyTransform = t => { const r=Math.random(); if(r<0.5) return t.toUpperCase(); if(r<0.8) return altCaps(t); return t.toUpperCase()+"!!"; };

// ── Markov ─────────────────────────────────────────────────────────────────
function markovNext(chain, cur, temp, pool) {
  const nexts = chain[cur];
  if (!nexts) return pick(pool);
  const keys = Object.keys(nexts);
  const w = keys.map(k => Math.pow(nexts[k], 1/Math.max(temp,0.01)));
  const total = w.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for (let i=0;i<keys.length;i++) { r-=w[i]; if(r<=0) return keys[i]; }
  return keys[keys.length-1];
}
function markovWalk(chain, pool, steps, temp) {
  if (!pool.length) return [];
  const starts = Object.keys(chain).length ? Object.keys(chain) : pool;
  let cur = pick(starts);
  const res = [cur];
  for (let i=1;i<steps;i++) { cur=markovNext(chain,cur,temp,pool); res.push(cur); }
  return res;
}
function mergeChain(existing, tokens) {
  const u = {...existing};
  for (let i=0;i<tokens.length-1;i++) {
    const a=tokens[i], b=tokens[i+1];
    if (!u[a]) u[a]={};
    u[a] = {...u[a], [b]:(u[a][b]||0)+1};
  }
  return u;
}

// ── Lexicon ────────────────────────────────────────────────────────────────
function ingest(text) {
  const phrases = text.split(/[.!?,;:\n]+/).map(s=>s.trim()).filter(s=>s.length>2&&s.length<80);
  const words = text.toLowerCase().replace(/[^a-z0-9'\s-]/g,"").split(/\s+/).filter(w=>w.length>1);
  const subtokens = words.flatMap(w => {
    if (w.length<=3) return [w];
    const chunks=[];
    for (let i=0;i<w.length;) { const sz=2+Math.floor(Math.random()*2); chunks.push(w.slice(i,i+sz)); i+=sz; }
    return chunks.filter(c=>c.length>0);
  });
  return {phrases,words,subtokens};
}

function generateUtterance({phrases,words,subtokens,phraseChain,wordChain,subtokenChain}, temp) {
  if (!phrases.length && !words.length) return "";
  const r = Math.random();
  if (temp<0.6 || (temp<1.0 && r<0.65)) {
    if (!phrases.length) return words.slice(-5).join(" ");
    const p = markovWalk(phraseChain,phrases,1,temp)[0] || phrases[phrases.length-1];
    const m = Math.random();
    if (m<0.12) return p.toUpperCase();
    if (m<0.22) return p+"...";
    if (m<0.30) return p.split(" ").slice(0,Math.max(1,Math.floor(p.split(" ").length*0.55))).join(" ");
    if (m<0.36) return p+" "+p.split(" ")[0];
    return p;
  }
  if (temp<1.4 || (temp<1.8 && r<0.55)) {
    if (!words.length) return phrases[phrases.length-1]||"";
    const walked = markovWalk(wordChain,words,2+Math.floor(Math.random()*4),temp);
    const joined = walked.join(" ");
    if (Math.random()<0.15) return joined.toUpperCase();
    if (Math.random()<0.12) return joined+" "+walked[0];
    return joined;
  }
  const pool  = subtokens.length>4 ? subtokens : words;
  const chain = subtokens.length>4 ? subtokenChain : wordChain;
  const frags = markovWalk(chain,pool,3+Math.floor(Math.random()*5),temp);
  const result=[];
  let i=0;
  while(i<frags.length) {
    if(i+1<frags.length && Math.random()<0.35){result.push(frags[i]+frags[i+1]);i+=2;}
    else{result.push(frags[i]);i++;}
  }
  const out=result.join(" ");
  if(Math.random()<0.2) return out.toUpperCase();
  if(Math.random()<0.15) return out+"...";
  return out;
}

// ── State ──────────────────────────────────────────────────────────────────
let lexicon = {phrases:[],words:[],subtokens:[],phraseChain:{},wordChain:{},subtokenChain:{}};
let temperature   = 0.9;
let sliderTemperature = 0.9; // tracks slider value independently
let commState     = "available"; // available | fatigued | outburst
let replyCount    = 0;
let careUses      = {treat:0,toy:0,pet:0};
let suppressInstincts = false;
let rapidCount    = 0;
let lastMsgTs     = 0;
let outburstThr   = randInt(5,8);
let fatigueThr    = randInt(5,15);
let cooldownTimer = null;
const instinctTimers = {};
const activeMoods = new Set(); // tracks which moods are currently active
const moodTemperatures = {}; // stores per-mood temperature values
const moodMessageTimers = {}; // stores message interval timers per mood
const moodInteractionState = {}; // stores mood-specific interaction state (e.g., curiosity message count)

// ── DOM refs ───────────────────────────────────────────────────────────────
const chatEl      = document.getElementById("chat");
const msgInput    = document.getElementById("msg-input");
const sendBtn     = document.getElementById("send-btn");
const parrotEl    = document.getElementById("parrot-indicator");
const tempSlider  = document.getElementById("temp-slider");
const tempVal     = document.getElementById("temp-val");
const tempMode    = document.getElementById("temp-mode");
const memoryEl    = document.getElementById("memory");
const careButtons = { treat: document.getElementById("care-treat"), toy: document.getElementById("care-toy"), pet: document.getElementById("care-pet") };

// ── Render helpers ─────────────────────────────────────────────────────────
function addMessage({from, text, instinct}) {
  const empty = chatEl.querySelector(".empty");
  if (empty) empty.remove();

  const isParrot = from === "parrot";
  const isOut    = instinct === "outburst";
  const emoji    = instinct ? EMOJI_MAP[instinct] : null;

  const row = document.createElement("div");
  row.className = "msg-row" + (isParrot ? "" : " user");

  if (isParrot) {
    const av = document.createElement("div");
    av.className = "avatar"; av.textContent = "🦜";
    row.appendChild(av);
  }

  const bubble = document.createElement("div");
  bubble.className = "bubble " + (isOut ? "outburst" : isParrot ? "parrot" : "user");

  const span = document.createElement("span");
  span.textContent = text;
  bubble.appendChild(span);

  if (isParrot && emoji) {
    const espan = document.createElement("span");
    espan.className = "inst-emoji"; espan.textContent = emoji;
    bubble.appendChild(espan);
  }

  row.appendChild(bubble);
  chatEl.appendChild(row);

  const now = new Date();
  const timestamp = now.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'});
  const tDiv = document.createElement("div");
  tDiv.className = "msg-timestamp";
  tDiv.style.textAlign = isParrot ? "left" : "right";
  tDiv.textContent = timestamp;
  chatEl.appendChild(tDiv);

  // keep max 120 messages
  while (chatEl.children.length > 120) chatEl.removeChild(chatEl.firstChild);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function updateUI() {
  const isOut = commState === "outburst";
  const isFat = commState === "fatigued";
  const fatRatio = replyCount / Math.max(fatigueThr, 1);

  // parrot indicator
  if (isOut) {
    parrotEl.textContent = "💥";
    parrotEl.style.fontSize = "18px";
    parrotEl.style.opacity = "1";
    parrotEl.style.animation = "flicker 0.2s infinite";
  } else {
    parrotEl.textContent = "🦜";
    parrotEl.style.animation = "none";
    if (isFat) {
      parrotEl.style.fontSize = "8px";
      parrotEl.style.opacity = "0.2";
    } else {
      parrotEl.style.fontSize = Math.round(20 - fatRatio*13) + "px";
      parrotEl.style.opacity  = (0.9 - fatRatio*0.6).toFixed(2);
    }
  }

  // send button
  if (isOut) {
    sendBtn.textContent = "💥";
    sendBtn.style.background = "#c22";
    sendBtn.style.color = "#fff";
    sendBtn.style.cursor = "not-allowed";
  } else if (isFat) {
    sendBtn.textContent = "SEND";
    sendBtn.style.background = "#f0f0f0";
    sendBtn.style.color = "#aaa";
    sendBtn.style.cursor = "pointer";
  } else {
    sendBtn.textContent = "SEND";
    sendBtn.style.background = "#111";
    sendBtn.style.color = "#fff";
    sendBtn.style.cursor = "pointer";
  }

  // input
  msgInput.placeholder = isOut ? "💥💥💥" : isFat ? "Chastico is tired, try to get his attention..." : "talk to Chastico...";
  msgInput.className   = isOut ? "outburst" : "";

  // care buttons
  CARE_ACTIONS.forEach(({id}) => {
    const btn = careButtons[id];
    btn.disabled = careUses[id] >= 999;
  });

  // memory
  memoryEl.textContent = `${new Set(lexicon.phrases).size} phrases · ${new Set(lexicon.words).size} words · ${new Set(lexicon.subtokens).size} tokens`;

  // temp
  tempSlider.value = temperature.toFixed(2);
  tempVal.textContent  = temperature.toFixed(2);
  tempMode.textContent = temperature < 0.6 ? "phrases" : temperature < 1.3 ? "words" : "tokens";
}

// ── State transitions ──────────────────────────────────────────────────────
function wakeUp() {
  commState   = "available";
  replyCount  = 0;
  careUses    = {treat:0,toy:0,pet:0};
  outburstThr = randInt(5,8);
  fatigueThr  = randInt(5,15);
  temperature = sliderTemperature;
  updateUI();
}

function enterFatigue() {
  commState        = "fatigued";
  replyCount       = 0;
  rapidCount       = 0;
  suppressInstincts = false;
  const cooldown = COMM.cooldownMin + Math.random()*(COMM.cooldownMax-COMM.cooldownMin);
  clearTimeout(cooldownTimer);
  cooldownTimer = setTimeout(wakeUp, cooldown);
  updateUI();
}

function enterOutburst() {
  commState         = "outburst";
  suppressInstincts = true;
  const outburstTemp = 1.80 + Math.random()*(2.0 - 1.80);
  temperature = outburstTemp;
  updateUI();
  const count = randInt(5,8);
  for (let i=0;i<count;i++) {
    const delay = (i+1)*(300+Math.random()*400);
    setTimeout(() => {
      const text = crazyTransform(generateUtterance(lexicon,temperature)||"!!!");
      addMessage({from:"parrot",text,instinct:"outburst"});
      if (i===count-1) setTimeout(enterFatigue, 600);
    }, delay);
  }
}

// ── Instinct timers ────────────────────────────────────────────────────────
// Each instinct has two phases:
// 1. COOLDOWN: Wait cooldownMin-Max milliseconds before activating
// 2. ACTIVE: Stay active for durationMin-Max seconds, generating messages at mood-specific intervals
function scheduleInstinct(inst) {
  const cooldown = inst.cooldownMin + Math.random()*(inst.cooldownMax - inst.cooldownMin);
  instinctTimers[inst.id] = setTimeout(() => {
    // Mood activation triggered
    activeMoods.add(inst.id);
    updateLegend();
    
    // Initialize mood-specific interaction state
    if (inst.id === "curiosity") {
      moodInteractionState["curiosity_msgCount"] = 0;
    }
    
    // Pick random temperature for this mood activation
    const moodTemp = inst.tempMin + Math.random()*(inst.tempMax - inst.tempMin);
    moodTemperatures[inst.id] = moodTemp;
    const prevTemp = temperature;
    temperature = moodTemp;
    updateUI();
    
    const duration = inst.durationMin + Math.random()*(inst.durationMax - inst.durationMin);
    const activationTime = Date.now();
    let messageCount = 0;
    
    // Generate message immediately on activation
    if (!suppressInstincts && (lexicon.phrases.length || lexicon.words.length)) {
      const text = generateUtterance(lexicon, temperature);
      if (text) { addMessage({from:"parrot", text, instinct: inst.id}); messageCount++; }
    }
    
    // Special case: Affection only sends one message
    if (inst.id === "affection") {
      setTimeout(() => {
        activeMoods.delete(inst.id);
        temperature = sliderTemperature;
        updateLegend();
        updateUI();
        scheduleInstinct(inst);
      }, duration);
      return;
    }
    
    // During active phase, generate periodic messages at mood-specific intervals
    if (inst.messageIntervalMin !== null) {
      const messageInterval = inst.messageIntervalMin + Math.random()*(inst.messageIntervalMax - inst.messageIntervalMin);
      moodMessageTimers[inst.id] = setInterval(() => {
        if (activeMoods.has(inst.id)) {
          const elapsed = Date.now() - activationTime;
          if (elapsed < duration) {
            if (!suppressInstincts && (lexicon.phrases.length || lexicon.words.length)) {
              const text = generateUtterance(lexicon, temperature);
              if (text) { addMessage({from:"parrot", text, instinct: inst.id}); messageCount++; }
            }
          } else {
            clearInterval(moodMessageTimers[inst.id]);
            delete moodMessageTimers[inst.id];
            activeMoods.delete(inst.id);
            temperature = sliderTemperature;
            updateLegend();
            updateUI();
            scheduleInstinct(inst);
          }
        }
      }, messageInterval);
    }
    
  }, cooldown);
}
INSTINCTS.forEach(scheduleInstinct);

// ── Send message ───────────────────────────────────────────────────────────
function handleSend() {
  const text = msgInput.value.trim();
  if (!text || commState==="outburst") { msgInput.value=""; return; }
  msgInput.value = "";
  addMessage({from:"user",text});

  // Handle mood interactions with user message
  stopMood("attention");
  restartMoodDuration("territorial");
  
  // Track curiosity message count
  if (activeMoods.has("curiosity")) {
    moodInteractionState["curiosity_msgCount"] = (moodInteractionState["curiosity_msgCount"] || 0) + 1;
    if (moodInteractionState["curiosity_msgCount"] >= 5) {
      stopMood("curiosity");
    }
  }

  const {phrases,words,subtokens} = ingest(text);
  lexicon = {
    phrases:       [...lexicon.phrases,   ...phrases  ].slice(-1000),
    words:         [...lexicon.words,     ...words    ].slice(-3300),
    subtokens:     [...lexicon.subtokens, ...subtokens].slice(-6600),
    phraseChain:   mergeChain(lexicon.phraseChain,   phrases),
    wordChain:     mergeChain(lexicon.wordChain,     words),
    subtokenChain: mergeChain(lexicon.subtokenChain, subtokens),
  };

  const now = Date.now();
  if (now - lastMsgTs > RAPID_WINDOW_MS) rapidCount = 0;
  rapidCount++;
  lastMsgTs = now;

  if (rapidCount >= outburstThr && commState !== "outburst") {
    rapidCount = 0;
    clearTimeout(cooldownTimer);
    suppressInstincts = true;
    setTimeout(enterOutburst, 200);
    updateUI();
    return;
  }

  if (commState==="available" && (lexicon.phrases.length||lexicon.words.length)) {
    suppressInstincts = true;
    const delay = COMM.replyWindowMin + Math.random()*(COMM.replyWindowMax-COMM.replyWindowMin);
    setTimeout(() => {
      if (commState !== "available") { suppressInstincts=false; updateUI(); return; }
      const utterance = generateUtterance(lexicon, temperature);
      addMessage({from:"parrot",text:utterance,instinct:"comm"});
      rapidCount = 0;
      suppressInstincts = false;
      replyCount++;
      if (replyCount >= fatigueThr) enterFatigue();
      else updateUI();
      saveLexiconToStorage();
    }, delay);
  }

  updateUI();
  saveLexiconToStorage();
}

sendBtn.addEventListener("click", handleSend);
msgInput.addEventListener("keydown", e => { if (e.key==="Enter") handleSend(); });
// ── Mood interaction helpers ───────────────────────────────────────────────
function stopMood(moodId) {
  if (activeMoods.has(moodId)) {
    activeMoods.delete(moodId);
    if (moodMessageTimers[moodId]) {
      clearInterval(moodMessageTimers[moodId]);
      delete moodMessageTimers[moodId];
    }
    // Clear interaction state for this mood
    Object.keys(moodInteractionState).forEach(key => {
      if (key.startsWith(moodId + "_")) delete moodInteractionState[key];
    });
    temperature = sliderTemperature;
    updateLegend();
    updateUI();
  }
}

function restartMoodDuration(moodId) {
  // Restarts mood active duration without going through cooldown
  const inst = INSTINCTS.find(i => i.id === moodId);
  if (!inst || !activeMoods.has(moodId)) return;
  
  // Clear existing message timer
  if (moodMessageTimers[moodId]) {
    clearInterval(moodMessageTimers[moodId]);
    delete moodMessageTimers[moodId];
  }
  
  const duration = inst.durationMin + Math.random()*(inst.durationMax - inst.durationMin);
  const activationTime = Date.now();
  
  // Restart message generation
  if (inst.messageIntervalMin !== null) {
    const messageInterval = inst.messageIntervalMin + Math.random()*(inst.messageIntervalMax - inst.messageIntervalMin);
    moodMessageTimers[moodId] = setInterval(() => {
      if (activeMoods.has(moodId)) {
        const elapsed = Date.now() - activationTime;
        if (elapsed < duration) {
          if (!suppressInstincts && (lexicon.phrases.length || lexicon.words.length)) {
            const text = generateUtterance(lexicon, temperature);
            if (text) { addMessage({from:"parrot", text, instinct: moodId}); }
          }
        } else {
          clearInterval(moodMessageTimers[moodId]);
          delete moodMessageTimers[moodId];
          activeMoods.delete(moodId);
          temperature = sliderTemperature;
          updateLegend();
          updateUI();
          scheduleInstinct(inst);
        }
      }
    }, messageInterval);
  }
}

function resetMood(moodId) {
  // Reset: restarts mood active duration if already active
  if (activeMoods.has(moodId)) {
    restartMoodDuration(moodId);
  }
  // If not active, reset has no effect (mood will activate on its cooldown timer)
}
// ── Care buttons ───────────────────────────────────────────────────────────
function handleCare(id) {
  if (commState==="outburst") return;
  const success = Math.random() < (0.2 + Math.random()*0.6);
  if (!success) {
    careUses[id] = 999;
    updateUI();
    return;
  }
  
  // Handle mood interactions
  if (id === "treat") {
    stopMood("hunger");
    resetMood("reward");
  } else if (id === "toy") {
    stopMood("playful");
    resetMood("curiosity");
  } else if (id === "pet") {
    stopMood("affection");
    resetMood("arousal");
  }
  
  // Any care action also resets territorial
  restartMoodDuration("territorial");
  
  if (lexicon.words.length||lexicon.phrases.length) {
    const utterance = generateUtterance(lexicon, 0.3);
    if (utterance) addMessage({from:"parrot",text:utterance,instinct:"affection"});
  }
  if (commState==="fatigued") {
    clearTimeout(cooldownTimer);
    wakeUp();
  }
  updateUI();
  saveLexiconToStorage();
}
CARE_ACTIONS.forEach(({id}) => careButtons[id].addEventListener("click", () => handleCare(id)));

// ── Temperature slider ─────────────────────────────────────────────────────
tempSlider.addEventListener("input", e => { 
  sliderTemperature = parseFloat(e.target.value);
  // Only update active temperature if no mood is active
  if (activeMoods.size === 0 && commState !== "outburst") {
    temperature = sliderTemperature;
  }
  updateUI(); 
});

// ── LocalStorage helpers ───────────────────────────────────────────────────
function saveLexiconToStorage() {
  try {
    localStorage.setItem("chastico-lexicon", JSON.stringify(lexicon));
  } catch (e) {
    console.warn("Failed to save to localStorage:", e);
  }
}

function loadLexiconFromStorage() {
  try {
    const stored = localStorage.getItem("chastico-lexicon");
    if (stored) {
      const p = JSON.parse(stored);
      if (p.phrases && p.words && p.subtokens) {
        lexicon = {
          phrases:       (p.phrases      ||[]).slice(-1000),
          words:         (p.words        ||[]).slice(-3300),
          subtokens:     (p.subtokens    ||[]).slice(-6600),
          phraseChain:   p.phraseChain   ||{},
          wordChain:     p.wordChain     ||{},
          subtokenChain: p.subtokenChain ||{},
        };
        return true;
      }
    }
  } catch (e) {
    console.warn("Failed to load from localStorage:", e);
  }
  return false;
}

// ── Save / Load ────────────────────────────────────────────────────────────
document.getElementById("save-btn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(lexicon,null,2)],{type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href=url; a.download="chastico-memory.json"; a.click();
  URL.revokeObjectURL(url);
});
document.getElementById("load-btn").addEventListener("click", () => document.getElementById("load-input").click());
document.getElementById("clear-btn").addEventListener("click", () => {
  if (confirm("Clear all saved memory?")) {
    lexicon = {phrases:[],words:[],subtokens:[],phraseChain:{},wordChain:{},subtokenChain:{}};
    localStorage.removeItem("chastico-lexicon");
    updateUI();
  }
});
document.getElementById("load-input").addEventListener("change", e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const p = JSON.parse(ev.target.result);
      if (!p.phrases||!p.words||!p.subtokens) throw new Error();
      lexicon = {
        phrases:       (p.phrases      ||[]).slice(-1000),
        words:         (p.words        ||[]).slice(-3300),
        subtokens:     (p.subtokens    ||[]).slice(-6600),
        phraseChain:   p.phraseChain   ||{},
        wordChain:     p.wordChain     ||{},
        subtokenChain: p.subtokenChain ||{},
      };
      saveLexiconToStorage();
      updateUI();
    } catch { alert("invalid file format"); }
  };
  reader.readAsText(file);
  e.target.value="";
});

// ── Legend interaction tips ────────────────────────────────────────────────
const MOOD_TIPS = {
  hunger: "Stop with 🍪 cookie",
  attention: "Stop with 💬 message",
  playful: "Stop with 🪀 toy",
  affection: "Stop with ✋ pet",
  arousal: "Extend with ✋ pet",
  reward: "Extend with 🍪 cookie",
  territorial: "Extend with any action (message or care)",
  curiosity: "Stop with 5+ messages or 🪀 toy",
  boredom: "Cannot be stopped (let it pass)",
  comm: "Responds unless fatigued",
  outburst: "Triggered by rapid messaging",
};

// ── Legend ─────────────────────────────────────────────────────────────────
const legendEl = document.getElementById("legend");
[...INSTINCTS,{id:"comm",emoji:COMM.emoji,label:COMM.label},{id:"outburst",emoji:"💥",label:"Outburst"}].forEach(({id,emoji,label}) => {
  const div = document.createElement("div");
  div.className = "leg-item";
  div.setAttribute("data-mood-id", id);
  div.title = MOOD_TIPS[id] || "";
  div.innerHTML = `<span class="e">${emoji}</span><span>${label}</span>`;
  legendEl.appendChild(div);
});

function updateLegend() {
  INSTINCTS.concat([{id:"comm"},{id:"outburst"}]).forEach(({id}) => {
    const item = legendEl.querySelector(`[data-mood-id="${id}"]`);
    if (item) {
      if (activeMoods.has(id)) {
        item.classList.add("active");
      } else {
        item.classList.remove("active");
      }
    }
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
function initializeWithRandomMood() {
  const randomInst = INSTINCTS[Math.floor(Math.random()*INSTINCTS.length)];
  
  // Cancel the pre-scheduled cooldown for this mood so it activates immediately
  clearTimeout(instinctTimers[randomInst.id]);
  
  // Immediately activate the random mood
  activeMoods.add(randomInst.id);
  updateLegend();
  
  // Initialize interaction state
  if (randomInst.id === "curiosity") {
    moodInteractionState["curiosity_msgCount"] = 0;
  }
  
  // Pick random temperature for this mood
  const moodTemp = randomInst.tempMin + Math.random()*(randomInst.tempMax - randomInst.tempMin);
  moodTemperatures[randomInst.id] = moodTemp;
  temperature = moodTemp;
  
  const duration = randomInst.durationMin + Math.random()*(randomInst.durationMax - randomInst.durationMin);
  const activationTime = Date.now();
  
  // Special case: Affection sends one message and ends
  if (randomInst.id === "affection") {
    // Generate initial message
    if (lexicon.phrases.length || lexicon.words.length) {
      const text = generateUtterance(lexicon, temperature);
      if (text) addMessage({from:"parrot", text, instinct: randomInst.id});
    }
    // Schedule mood end
    setTimeout(() => {
      activeMoods.delete(randomInst.id);
      temperature = sliderTemperature;
      updateLegend();
      updateUI();
      scheduleInstinct(randomInst);
    }, duration);
    return;
  }
  
  // For other moods, set up message interval
  if (randomInst.messageIntervalMin !== null) {
    const messageInterval = randomInst.messageIntervalMin + Math.random()*(randomInst.messageIntervalMax - randomInst.messageIntervalMin);
    moodMessageTimers[randomInst.id] = setInterval(() => {
      if (activeMoods.has(randomInst.id)) {
        const elapsed = Date.now() - activationTime;
        if (elapsed < duration) {
          if (!suppressInstincts && (lexicon.phrases.length || lexicon.words.length)) {
            const text = generateUtterance(lexicon, temperature);
            if (text) addMessage({from:"parrot", text, instinct: randomInst.id});
          }
        } else {
          clearInterval(moodMessageTimers[randomInst.id]);
          delete moodMessageTimers[randomInst.id];
          activeMoods.delete(randomInst.id);
          temperature = sliderTemperature;
          updateLegend();
          updateUI();
          scheduleInstinct(randomInst);
        }
      }
    }, messageInterval);
  }
}

loadLexiconFromStorage();
updateUI();
// Start all mood cooldown timers
INSTINCTS.forEach(scheduleInstinct);
// Then immediately activate one random mood (canceling its pre-scheduled timer)
initializeWithRandomMood();
updateLegend();
</script>
